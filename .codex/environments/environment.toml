# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "aiwerewolf"

[setup]
script = '''
set -euo pipefail

worktree="${CODEX_WORKTREE_PATH:-$PWD}"
cd "$worktree"

main_repo="$(dirname "$(git rev-parse --path-format=absolute --git-common-dir)")"

if [ ! -d "$main_repo/node_modules" ]; then
  echo "Dependencies are missing. Run npm ci once in $main_repo first."
  exit 1
fi

if [ ! -e node_modules ]; then
  ln -s "$main_repo/node_modules" node_modules
fi'''

[[actions]]
name = "Verify"
icon = "tool"
command = "npm run test:run -- --cache=false && npm run build"

[[actions]]
name = "Start app"
icon = "tool"
command = "npm run dev -- --host 127.0.0.1 --port 5173"
